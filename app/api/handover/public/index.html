<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEST76 STUDIO</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  margin:0;
  background:#FAFAFA;
  color:#111111;
  display:flex;
  justify-content:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:480px;
  padding:80px 24px 60px 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.logo{
  width:96px;
  margin-bottom:32px;
}

.product-name{
  font-size:14px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:#6b7280;
  margin-bottom:24px;
}

h1{
  font-size:34px;
  font-weight:700;
  line-height:1.15;
  margin:0 0 20px 0;
  letter-spacing:-0.02em;
  max-width:300px;
}

p{
  font-size:17px;
  line-height:1.6;
  color:#4b5563;
  margin:0 0 36px 0;
  max-width:320px;
}

.cta-button{
  background:#1e3a8a;
  color:white;
  padding:18px 32px;
  border-radius:16px;
  font-weight:600;
  font-size:16px;
  text-decoration:none;
  display:inline-block;

  box-shadow:
    0 8px 20px rgba(30,58,138,0.18),
    0 2px 4px rgba(0,0,0,0.08);

  transition:transform .12s ease,
             box-shadow .12s ease;
}

.cta-button:active{
  transform:translateY(2px);

  box-shadow:
    0 4px 10px rgba(30,58,138,0.16),
    0 1px 2px rgba(0,0,0,0.08);
}

.usecase{
  margin-top:48px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.usecase-inner{
  max-width:320px;
  width:100%;
  text-align:left;
}

.usecase-title{
  font-weight:600;
  margin-bottom:12px;
}

.usecase-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 16px;
  font-size:15px;
}

</style>
</head>

<body>

<div class="container">

<img src="/logo/logo-nest-paket.png" alt="NEST Paket Logo" class="logo">

<div class="product-name">NEST76 STUDIO</div>

<h1>Serah terima barang sekarang lebih tenang.</h1>

<p>Tanda terima digital gratis. No tipu-tipu.</p>

<a href="#">Buat Serah Terima</a>

<div class="usecase">

<div class="usecase-inner">

<div class="usecase-title">
Mudah banget, cocok buat
</div>

<div class="usecase-list">
<div>📦 Titip paket</div>
<div>🧺 Laundry</div>
<div>📄 Dokumen</div>
<div>🏢 Barang kantor</div>
</div>

</div>

</div>

</div>

</body>
</html>
